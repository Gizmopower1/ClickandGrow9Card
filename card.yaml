type: custom:mod-card
card_mod:
  style: |
    ha-card {
      border: 3px solid #e0e0e0 !important; /* Den lyse grå rammen */
      border-radius: 50px !important;       /* Veldig runde hjørner for å matche poddene */
      padding: 40px 20px 40px 20px !important; /* Luft (Topp, Høyre, Bunn, Venstre) */
      background-color: #f7f7f7 !important; /* Gjør maskinen 2% mørkere enn en hvit bakgrunn */
      box-shadow: 0px 10px 30px rgba(0,0,0,0.08) !important; /* Myk 3D-skygge under basen */
    }
card:
  type: custom:layout-card
  layout_type: custom:grid-layout
  layout:
    grid-template-columns: 10% 10% 10% 10% 10% 10% 10% 10% 10% 10%
    grid-gap: 5px
    grid-template-areas: |
      ".  p6 p6 p7 p7 p8 p8 p9 p9  ."
      "p1 p1 p2 p2 p3 p3 p4 p4 p5 p5"
  cards:
    - type: custom:button-card
      entity: input_text.cng_pod_1
      icon: mdi:sprout
      show_state: true
      show_name: false
      show_label: true
      label: |
        [[[ return 'Satt: ' + states['input_datetime.pod_1_dato'].state; ]]]
      tap_action:
        action: more-info
      hold_action:
        action: more-info
        entity: input_datetime.pod_1_dato
      view_layout:
        grid-area: p1
      styles:
        card:
          - height: 200px
          - width: 200px
          - border-radius: 100%
        icon:
          - width: 100px
          - color: green
        state:
          - font-size: 30px
          - font-weight: bold
          - padding-top: 10px
          - padding-bottom: 10px
        label:
          - font-size: 14px
          - color: gray
          - padding-bottom: 10px
